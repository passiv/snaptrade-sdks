name: Regenerate SDKs Manually

on:
  workflow_dispatch:
    inputs:
      changeset_type:
        description: Semver bump to use for the generated SDK changeset
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease
      changeset_message:
        description: Description to use for the generated SDK changeset
        required: true
        type: string
      create_pull_request:
        description: Create a pull request for the generated SDK changes
        required: true
        default: true
        type: boolean

jobs:
  prepare-regeneration:
    name: Prepare regeneration
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      base_branch: ${{ steps.resolve-pr.outputs.base_branch }}
      head_branch: ${{ steps.resolve-pr.outputs.head_branch }}
      pr_url: ${{ steps.resolve-pr.outputs.pr_url }}
    env:
      HEAD_BRANCH: ${{ inputs.create_pull_request && format('sdk-regeneration/manual-{0}', github.run_id) || github.ref_name }}
    steps:
      - name: Checkout base branch
        if: inputs.create_pull_request
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Create regeneration branch
        if: inputs.create_pull_request
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$HEAD_BRANCH"
          git commit --allow-empty -m "chore: prepare manual SDK regeneration"
          git push --set-upstream origin "$HEAD_BRANCH"

      - name: Create pull request
        if: inputs.create_pull_request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > pr-body.md <<'PR_BODY'
          Manually triggered SDK regeneration from ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}.

          Changeset type: ${{ inputs.changeset_type }}
          Changeset message: ${{ inputs.changeset_message }}
          PR_BODY

          gh pr create \
            --base "${{ github.ref_name }}" \
            --head "$HEAD_BRANCH" \
            --title "Regenerate SDKs" \
            --body-file pr-body.md

      - name: Resolve top-level pull request
        id: resolve-pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          prs=$(gh pr list \
            --head "$HEAD_BRANCH" \
            --state open \
            --limit 2 \
            --json baseRefName,headRefName,url)
          count=$(jq 'length' <<<"$prs")

          if [ "$count" -ne 1 ]; then
            echo "::error::Expected exactly one open pull request with head branch '$HEAD_BRANCH', found $count."
            exit 1
          fi

          echo "base_branch=$(jq -r '.[0].baseRefName' <<<"$prs")" >> "$GITHUB_OUTPUT"
          echo "head_branch=$(jq -r '.[0].headRefName' <<<"$prs")" >> "$GITHUB_OUTPUT"
          echo "pr_url=$(jq -r '.[0].url' <<<"$prs")" >> "$GITHUB_OUTPUT"

  regenerate-sdks-manual:
    name: Regenerate SDKs
    needs: prepare-regeneration
    permissions:
      contents: write
      packages: read
      pull-requests: write
    uses: passiv/konfig-workflows/.github/workflows/regenerate-sdks.yaml@main
    with:
      konfig_yaml_dir: ./
      changeset_type: ${{ inputs.changeset_type }}
      changeset_message: ${{ inputs.changeset_message }}
      base_branch: ${{ needs.prepare-regeneration.outputs.base_branch }}
      head_branch: ${{ needs.prepare-regeneration.outputs.head_branch }}
      top_level_pr_url: ${{ needs.prepare-regeneration.outputs.pr_url }}
      merge_environment: sdk-regeneration-merge
    secrets:
      TEST_ENV: ${{ secrets.TEST_ENV }}
      KONFIG_API_KEY: ${{ secrets.KONFIG_API_KEY }}
      SUBMODULE_DEPLOY_KEY_PHP: ${{ secrets.SUBMODULE_DEPLOY_KEY_PHP }}
      SUBMODULE_DEPLOY_KEY_PHP7: ${{ secrets.SUBMODULE_DEPLOY_KEY_PHP7 }}
