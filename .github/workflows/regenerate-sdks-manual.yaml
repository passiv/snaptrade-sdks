name: Regenerate SDKs Manually

on:
  workflow_dispatch:
    inputs:
      changeset_type:
        description: Semver bump to use for the generated SDK changeset
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  regenerate-sdks-manual:
    uses: passiv/konfig-workflows/.github/workflows/regenerate-sdks.yaml@main
    with:
      konfig_yaml_dir: ./
      changeset_type: ${{ inputs.changeset_type }}
    secrets:
      TEST_ENV: ${{ secrets.TEST_ENV }}
      KONFIG_API_KEY: ${{ secrets.KONFIG_API_KEY }}
      SUBMODULE_DEPLOY_KEY_PHP: ${{ secrets.SUBMODULE_DEPLOY_KEY_PHP }}
      SUBMODULE_DEPLOY_KEY_PHP7: ${{ secrets.SUBMODULE_DEPLOY_KEY_PHP7 }}
